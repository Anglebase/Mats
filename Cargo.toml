[package]
name = "mats"
version = "0.1.0"
edition = "2021"
description = "用于处理矩阵和向量的 Rust 库 | A Rust library for handling matrices and vectors"
repository = "https://github.com/Anglebase/Mats.git"
license = "MIT"

[dependencies]
gl = { version = "0.14.0", optional = true }

[features]
glsl = ["gl"]
default = ["glsl"]
